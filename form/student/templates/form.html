<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Signin</title>
</head>
<body>
    <h2>Student Form</h2>

    <form method="POST">

    </form>
    <p>{{message}}</p>

</html>
